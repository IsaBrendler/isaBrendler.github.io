<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project — Isadora Brendler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="project.css?v=6" />
</head>
<body class="project-body">

  <main class="project-template">
    <a class="project-template__back" href="index.html">← Back to home</a>

    <!-- Top section: Title/Subtitle + Main Image -->
    <section class="project-template__split project-template__split--intro">
      <div class="project-template__copy">
        <h1 class="project-template__title" id="project-title"></h1>
        <p class="project-template__subtitle" id="project-subtitle"></p>
      </div>
      <div class="project-template__media project-template__media--wide" id="split-image"></div>
    </section>

    <!-- Metadata: Activities & Skills -->
    <section class="project-template__metadata" id="project-metadata" hidden>
      <div class="project-metadata__block" id="project-metadata-activities-block" hidden>
        <h3 class="project-metadata__title">Activities &amp; Responsibilities</h3>
        <ul class="project-metadata__list" id="project-metadata-activities"></ul>
      </div>
      <div class="project-metadata__block" id="project-metadata-skills-block" hidden>
        <h3 class="project-metadata__title">Skills Involved</h3>
        <div class="project-metadata__skills" id="project-metadata-skills"></div>
      </div>
    </section>

    <!-- Description Copy Section (Mixed with Showcase screenshots) -->
    <section class="project-template__description-cols">
      <div class="project-template__desc-col">
        <h2 id="section1-title"></h2>
        <p class="project-template__serif" id="section1-body"></p>
        <div class="project-template__showcase-media" id="showcase-img-1" hidden></div>
      </div>
      <div class="project-template__desc-col" id="section2-col" hidden>
        <h2 id="section2-title"></h2>
        <p class="project-template__serif" id="section3-body"></p>
        <div class="project-template__showcase-media" id="showcase-img-2" hidden></div>
      </div>
    </section>

    <!-- Screenshots Gallery -->
    <section class="project-template__gallery" id="project-gallery" hidden></section>

    <a class="project-template__link" id="project-link" hidden></a>
  </main>

  <!-- Lightbox Modal -->
  <div class="project-template__lightbox" id="lightbox" aria-hidden="true">
    <button class="project-template__lightbox-close" id="lightbox-close" aria-label="Close image">&times;</button>
    <img class="project-template__lightbox-img" id="lightbox-img" src="" alt="" />
  </div>

  <script src="projects.js?v=6"></script>
</body>
</html>
